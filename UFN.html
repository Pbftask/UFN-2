<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>UFN · Dashboard</title>
  <!-- Font Awesome 6 (gratis) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ----- reset & dasar ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b1120;
      background-image: radial-gradient(circle at 10% 20%, rgba(30, 58, 138, 0.15) 0%, transparent 50%);
      min-height: 100vh;
      color: #f1f5f9;
      padding: 0 12px 90px 12px;
    }

    /* ----- header modern ----- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 8px 8px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
      flex-wrap: wrap;
      gap: 10px 0;
    }

    .header-left {
      display: flex;
      flex-direction: column;
    }

    .header-left h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .header-left .subhead {
      font-size: 13px;
      color: #94a3b8;
      letter-spacing: 0.3px;
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-left .subhead i {
      font-size: 10px;
      color: #38bdf8;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* ----- online counter (chip) ----- */
    .online-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(2px);
      padding: 6px 14px 6px 10px;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      font-weight: 500;
      color: #e2e8f0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .online-dot {
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px #4ade80aa;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0% { opacity: 0.7; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.1); }
      100% { opacity: 0.7; transform: scale(0.95); }
    }

    .online-chip .count {
      font-weight: 600;
      min-width: 20px;
      text-align: center;
      color: #f8fafc;
    }

    /* ----- inbox (tombol amplop) ----- */
    .inbox-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .inbox-btn {
      background: #1e293b;
      width: 44px;
      height: 44px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s ease;
      color: #e2e8f0;
      font-size: 20px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .inbox-btn:active {
      transform: scale(0.92);
      background: #2d3a52;
    }

    .inbox-btn.has-new {
      background: #7f1d1d;
      border-color: #ef4444;
      color: #fecaca;
      box-shadow: 0 4px 14px rgba(239, 68, 68, 0.5);
      animation: pulse-inbox 1.4s infinite;
    }

    @keyframes pulse-inbox {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.55); }
      70% { box-shadow: 0 0 0 9px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }

    .inbox-btn i {
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #ef4444;
      color: white;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      border: 2px solid #0b1120;
      box-shadow: 0 2px 6px rgba(239, 68, 68, 0.5);
      letter-spacing: 0.3px;
    }

    .badge.hidden {
      display: none;
    }

    /* ----- grid menu (lemari) ----- */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 28px;
    }

    .menu-card {
      background: #1a253b;
      background: linear-gradient(145deg, #1a253b, #131d31);
      border-radius: 20px;
      padding: 18px 8px 12px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.5);
      transition: all 0.15s ease;
      backdrop-filter: blur(2px);
    }

    .menu-card:active {
      transform: scale(0.94);
      background: #1f2d49;
    }

    .menu-card a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #f1f5f9;
      width: 100%;
      height: 100%;
    }

    .menu-card .icon {
      font-size: 30px;
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 18px;
      transition: 0.2s;
      color: #b9c8f0;
    }

    .menu-card:hover .icon {
      color: #a5b4fc;
      transform: translateY(-2px);
    }

    .menu-card .label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #cbd5e1;
      margin-top: 2px;
      text-transform: capitalize;
    }

    /* ----- footer ----- */
    .footer {
      margin-top: 36px;
      text-align: center;
      font-size: 13px;
      color: #475569;
      border-top: 1px solid rgba(255,255,255,0.04);
      padding-top: 24px;
      letter-spacing: 0.5px;
    }

    .footer span {
      background: rgba(255,255,255,0.02);
      padding: 4px 14px;
      border-radius: 40px;
    }

    /* ----- bottom navigation ----- */
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      box-shadow: 0 -8px 20px rgba(0, 0, 0, 0.4);
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      flex: 1;
      background: none;
      border: none;
      color: #64748b;
      font-family: inherit;
      padding: 6px 4px;
      border-radius: 14px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .nav-btn i {
      font-size: 20px;
    }

    .nav-btn span {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2px;
    }

    .nav-btn.active {
      color: #a5b4fc;
    }

    .nav-btn.active i {
      filter: drop-shadow(0 0 6px rgba(165, 180, 252, 0.6));
    }

    .nav-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.05);
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin: 24px 4px 4px;
    }

    /* ----- responsive kecil ----- */
    @media (max-width: 420px) {
      .header-left h1 { font-size: 22px; }
      .menu-grid { gap: 12px; }
      .menu-card { padding: 14px 4px 10px; }
      .menu-card .icon { font-size: 26px; width: 48px; height: 48px; }
    }

    @media (min-width: 600px) {
      .menu-grid { gap: 20px; }
      .menu-card { padding: 24px 12px 16px; }
    }

    /* animasi masuk halus */
    .menu-card {
      opacity: 0;
      animation: fadeUp 0.4s ease forwards;
    }
    .menu-card:nth-child(1) { animation-delay: 0.02s; }
    .menu-card:nth-child(2) { animation-delay: 0.06s; }
    .menu-card:nth-child(3) { animation-delay: 0.10s; }
    .menu-card:nth-child(4) { animation-delay: 0.14s; }
    .menu-card:nth-child(5) { animation-delay: 0.18s; }
    .menu-card:nth-child(6) { animation-delay: 0.22s; }
    .menu-card:nth-child(7) { animation-delay: 0.26s; }
    .menu-card:nth-child(8) { animation-delay: 0.30s; }
    .menu-card:nth-child(9) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

a {
    -webkit-tap-highlight-color: transparent;
    tap-highlight-color: transparent;
    text-decoration: none;
    color: inherit;
    outline: none;
}

      * {
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
      }
    
    .tag{
      background: red;
      position: absolute;
      font-size: 10px;
      padding:5px;
      border-radius: 20px;
    }
  </style>
</head>
<body>

  <!-- ===== FIREBASE + LOGIC ===== -->
  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    // =====================================================
    //  KONFIGURASI FIREBASE (sesuai milik Anda)
    // =====================================================
const firebaseConfig = {
  apiKey: "AIzaSyA4HuTmEgiowYaBH3doN2INZD5chk9NG-U",
  authDomain: "puki-678bf.firebaseapp.com",
  databaseURL: "https://puki-678bf-default-rtdb.firebaseio.com",
  projectId: "puki-678bf",
  storageBucket: "puki-678bf.firebasestorage.app",
  messagingSenderId: "343647284151",
  appId: "1:343647284151:web:c26e7f5f75235c187a1632"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // =====================================================
    //  USER ID (disimpan di localStorage)
    // =====================================================
    let userId = localStorage.getItem("ufn_user_id");
    if (!userId) {
      userId = crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
      localStorage.setItem("ufn_user_id", userId);
    }

    // =====================================================
    //  ONLINE / PRESENCE
    // =====================================================
    const userRef = db.ref("online/" + userId);
    userRef.set(true);
    userRef.onDisconnect().remove();

    // =====================================================
    //  HITUNG ONLINE (counter)
    // =====================================================
    db.ref("online").on("value", function(snapshot) {
      const jumlah = snapshot.numChildren();
      const el = document.getElementById("onlineCount");
      if (el) el.textContent = jumlah;
    });

    // =====================================================
    //  BADGE INBOX (pesan belum dibaca)
    // =====================================================
    const lastRead = parseInt(localStorage.getItem("ufn_last_read") || "0");

    db.ref("messages").orderByChild("time").startAfter(lastRead).on("value", function(snapshot) {
      const jumlahBelumDibaca = snapshot.numChildren();
      const badge = document.getElementById("inboxBadge");
      const inboxBtn = document.getElementById("inboxBtn");
      if (badge) {
        if (jumlahBelumDibaca > 0) {
          badge.textContent = jumlahBelumDibaca > 99 ? "99+" : jumlahBelumDibaca;
          badge.classList.remove("hidden");
        } else {
          badge.classList.add("hidden");
        }
      }
      if (inboxBtn) {
        inboxBtn.classList.toggle("has-new", jumlahBelumDibaca > 0);
      }
    });

    console.log("UFN dashboard siap ✅");

    // =====================================================
    //  NAVIGASI ANTAR HALAMAN (Beranda / Game)
    // =====================================================
    function switchPage(page) {
      document.getElementById("page-beranda").classList.toggle("active", page === "beranda");
      document.getElementById("page-game").classList.toggle("active", page === "game");
      document.getElementById("navBeranda").classList.toggle("active", page === "beranda");
      document.getElementById("navGame").classList.toggle("active", page === "game");
      localStorage.setItem("ufn_last_page", page);
    }

    // ingat halaman terakhir dibuka
    const lastPage = localStorage.getItem("ufn_last_page") || "beranda";
    switchPage(lastPage);
  </script>
