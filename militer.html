<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR EMPIRE — Sistem Militer Multiplayer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --bg-1:#040711;
  --bg-2:#0a1128;
  --bg-3:#0d1b3e;
  --accent:#3d8bff;
  --accent2:#7c4dff;
  --danger:#ff4d6d;
  --success:#33e6a8;
  --warn:#ffc857;
  --glass-bg:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.12);
  --text-1:#eaf0ff;
  --text-2:#9db0d8;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,Arial,sans-serif;}
html,body{height:100%;}
body{
  background:
    radial-gradient(circle at 15% 10%, rgba(61,139,255,0.18), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(124,77,255,0.18), transparent 45%),
    linear-gradient(160deg,var(--bg-1),var(--bg-2) 45%,var(--bg-3));
  color:var(--text-1);
  min-height:100vh;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px;}
::-webkit-scrollbar-track{background:transparent;}

a{color:inherit;text-decoration:none;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
input,select,textarea{font-family:inherit;outline:none;}

.glass{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:0 8px 32px rgba(0,0,0,0.35);
}

/* ===== LOADING SCREEN ===== */
#loading-screen{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  background:radial-gradient(circle at 50% 40%,#0b1740,#04060f 75%);
  transition:opacity .6s ease, visibility .6s ease;
}
#loading-screen.hide{opacity:0;visibility:hidden;pointer-events:none;}
.logo-badge{
  width:96px;height:96px;border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-size:42px;box-shadow:0 0 60px rgba(61,139,255,0.55);
  animation:pulseLogo 2s ease-in-out infinite;
}
@keyframes pulseLogo{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.loading-bar{width:260px;height:6px;border-radius:10px;background:rgba(255,255,255,0.08);overflow:hidden;}
.loading-bar span{display:block;height:100%;width:30%;border-radius:10px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  animation:loadmove 1.1s ease-in-out infinite;}
@keyframes loadmove{0%{margin-left:-30%;}50%{margin-left:70%;}100%{margin-left:-30%;}}
#loading-screen h2{letter-spacing:3px;font-weight:700;}
#loading-screen p{color:var(--text-2);font-size:13px;}

/* ===== APP LAYOUT ===== */
#app{display:none;min-height:100vh;}
#app.ready{display:flex;}

.sidebar{
  width:250px;flex-shrink:0;min-height:100vh;
  padding:22px 16px;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
  border-right:1px solid var(--glass-border);
  background:rgba(6,10,26,0.55);
  z-index:50;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 22px 8px;}
.brand .logo-badge{width:42px;height:42px;border-radius:12px;font-size:18px;animation:none;box-shadow:0 0 24px rgba(61,139,255,0.5);}
.brand h1{font-size:16px;letter-spacing:1px;}
.brand span{display:block;font-size:11px;color:var(--text-2);}

.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;
  color:var(--text-2);font-size:14px;font-weight:500;transition:.2s;cursor:pointer;
}
.nav-item i{width:18px;text-align:center;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:var(--text-1);}
.nav-item.active{background:linear-gradient(135deg,rgba(61,139,255,0.25),rgba(124,77,255,0.2));color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.12);}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;display:none;}
.nav-badge.show{display:inline-block;}

.sidebar-footer{margin-top:auto;padding-top:14px;border-top:1px solid var(--glass-border);font-size:11px;color:var(--text-2);}
.uid-tag{font-size:10px;opacity:.6;word-break:break-all;}

.main{flex:1;min-width:0;padding:22px 26px 60px;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
.topbar h2{font-size:20px;display:flex;align-items:center;gap:10px;}
.topbar-stats{display:flex;gap:10px;flex-wrap:wrap;}
.pill{
  display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:30px;
  font-size:13px;font-weight:600;
}
.pill i{color:var(--accent);}
.pill.money i{color:var(--warn);}
.pill.power i{color:var(--danger);}
.pill.online i{color:var(--success);}
.pill .dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px var(--success);animation:blink 1.6s infinite;}
@keyframes blink{50%{opacity:.3;}}

.section{display:none;animation:fadeIn .35s ease;}
.section.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* Grid */
.grid{display:grid;gap:16px;}
.grid.cols-4{grid-template-columns:repeat(4,1fr);}
.grid.cols-3{grid-template-columns:repeat(3,1fr);}
.grid.cols-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid.cols-4{grid-template-columns:repeat(2,1fr);}.grid.cols-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){.grid.cols-4,.grid.cols-3,.grid.cols-2{grid-template-columns:1fr;}}

.stat-card{padding:18px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;right:-20px;top:-20px;width:90px;height:90px;
  background:radial-gradient(circle,rgba(61,139,255,0.25),transparent 70%);}
.stat-card .icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--accent),var(--accent2));font-size:18px;margin-bottom:12px;}
.stat-card .label{font-size:12px;color:var(--text-2);margin-bottom:4px;}
.stat-card .value{font-size:24px;font-weight:800;}
.stat-card .sub{font-size:11px;color:var(--success);margin-top:4px;}

.card{padding:20px;}
.card h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.card h3 i{color:var(--accent);}

.progress-bar{height:9px;border-radius:20px;background:rgba(255,255,255,0.08);overflow:hidden;margin-top:8px;}
.progress-bar span{display:block;height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s ease;}

.country-banner{display:flex;align-items:center;gap:18px;padding:20px;margin-bottom:20px;flex-wrap:wrap;}
.flag-big{font-size:52px;width:80px;height:80px;border-radius:18px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);}
.country-banner .info h2{font-size:22px;margin-bottom:2px;}
.country-banner .info span{color:var(--text-2);font-size:13px;}
.level-badge{margin-left:auto;text-align:center;padding:10px 18px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));}
.level-badge b{font-size:20px;display:block;}
.level-badge small{font-size:10px;opacity:.85;}

/* Unit grid */
.unit-chip{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;text-align:center;}
.unit-chip i{font-size:20px;color:var(--accent);}
.unit-chip b{font-size:17px;}
.unit-chip span{font-size:11px;color:var(--text-2);}

/* Upgrade / research items */
.item-row{display:flex;align-items:center;gap:14px;padding:14px;border-radius:14px;background:rgba(255,255,255,0.03);
  border:1px solid var(--glass-border);margin-bottom:10px;flex-wrap:wrap;}
.item-row .ic{width:46px;height:46px;border-radius:12px;background:rgba(61,139,255,0.15);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent);flex-shrink:0;}
.item-row .meta{flex:1;min-width:150px;}
.item-row .meta b{font-size:14px;}
.item-row .meta span{display:block;font-size:11px;color:var(--text-2);margin-top:2px;}
.item-row .cost{font-size:12px;color:var(--warn);margin-right:6px;}
.btn{
  padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:.2s;white-space:nowrap;
}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn.outline{background:transparent;border:1px solid var(--glass-border);color:var(--text-1);}
.btn.danger{background:linear-gradient(135deg,#ff4d6d,#ff8a4d);}
.btn.success{background:linear-gradient(135deg,#33e6a8,#3dd6ff);}
.btn.small{padding:6px 12px;font-size:12px;}

/* Production */
.prod-select{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.prod-select select,.prod-select input{padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);color:var(--text-1);}
.queue-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.04);margin-bottom:8px;}
.queue-item .qmeta{flex:1;}
.queue-item .qmeta b{font-size:13px;}
.timer-txt{font-size:12px;color:var(--warn);font-weight:700;}

/* Ranking */
.rank-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.rank-tab{padding:8px 16px;border-radius:20px;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);font-size:12px;font-weight:600;color:var(--text-2);}
.rank-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.rank-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:12px;margin-bottom:8px;background:rgba(255,255,255,0.03);}
.rank-row .pos{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:rgba(255,255,255,0.07);}
.rank-row.top1 .pos{background:linear-gradient(135deg,#ffd700,#ffb703);color:#111;}
.rank-row.top2 .pos{background:linear-gradient(135deg,#d8d8d8,#b0b0b0);color:#111;}
.rank-row.top3 .pos{background:linear-gradient(135deg,#cd7f32,#a9612f);color:#111;}
.rank-row .rflag{font-size:22px;}
.rank-row .rname{flex:1;font-size:13px;font-weight:600;}
.rank-row .rval{font-size:13px;color:var(--accent);font-weight:700;}

/* Alliance / chat */
.chat-box{height:320px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:12px;border-radius:12px;background:rgba(0,0,0,0.2);margin-bottom:12px;}
.chat-msg{max-width:80%;padding:8px 12px;border-radius:12px;background:rgba(255,255,255,0.06);font-size:13px;}
.chat-msg b{color:var(--accent);font-size:11px;display:block;margin-bottom:2px;}
.chat-input-row{display:flex;gap:8px;}
.chat-input-row input{flex:1;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);color:#fff;}

/* War list */
.player-search{display:flex;gap:10px;margin-bottom:16px;}
.player-search input{flex:1;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);color:#fff;}
.enemy-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,0.03);margin-bottom:8px;}
.enemy-row .rflag{font-size:26px;}
.enemy-row .info{flex:1;}
.enemy-row .info b{font-size:14px;}
.enemy-row .info span{font-size:11px;color:var(--text-2);}

/* Battle simulation */
.battle-stage{position:relative;height:220px;border-radius:16px;overflow:hidden;margin-bottom:16px;
  background:linear-gradient(180deg,#0a1230,#132048 60%,#1c2c1c);border:1px solid var(--glass-border);}
.battle-stage .sky{position:absolute;inset:0;}
.battle-unit{position:absolute;bottom:20px;font-size:26px;transition:left 2s linear;}
.battle-unit.jet{bottom:auto;top:30px;font-size:22px;}
.battle-unit.drone{bottom:auto;top:70px;font-size:18px;}
.battle-unit.ship{bottom:10px;font-size:24px;}
.explosion{position:absolute;font-size:30px;opacity:0;animation:boom 0.9s ease forwards;}
@keyframes boom{0%{opacity:0;transform:scale(.3);}40%{opacity:1;transform:scale(1.3);}100%{opacity:0;transform:scale(1.6);}}
.battle-log{max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;}
.log-entry{padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.04);border-left:3px solid var(--accent);
  animation:logIn .4s ease;}
@keyframes logIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.log-entry b{display:block;font-size:12px;color:var(--warn);margin-bottom:3px;}
.log-entry span{font-size:13px;color:var(--text-1);}

/* Toast */
#toast-wrap{position:fixed;top:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:10px;}
.toast{padding:14px 18px;border-radius:12px;min-width:260px;display:flex;align-items:center;gap:10px;
  animation:toastIn .35s ease, toastOut .4s ease 3.6s forwards;font-size:13px;}
.toast i{font-size:16px;}
.toast.success{border-left:4px solid var(--success);}
.toast.error{border-left:4px solid var(--danger);}
.toast.info{border-left:4px solid var(--accent);}
.toast.warn{border-left:4px solid var(--warn);}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px);}}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(3,6,16,0.7);backdrop-filter:blur(4px);z-index:9998;
  display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.show{display:flex;}
.modal-box{width:100%;max-width:460px;padding:24px;max-height:85vh;overflow-y:auto;}
.modal-box h3{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;font-size:17px;}
.modal-box .close-x{cursor:pointer;color:var(--text-2);font-size:16px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:var(--text-2);margin-bottom:6px;}
.form-group input,.form-group select{width:100%;padding:11px 12px;border-radius:10px;background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);color:#fff;}
.form-group .range-row{display:flex;align-items:center;gap:10px;}
.form-group .range-row input[type=range]{flex:1;}
.strategy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.strategy-opt{padding:10px;border-radius:10px;border:1px solid var(--glass-border);text-align:center;font-size:12px;cursor:pointer;background:rgba(255,255,255,0.03);}
.strategy-opt.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;font-weight:700;}

.hamburger{display:none;width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,0.06);align-items:center;justify-content:center;font-size:16px;}
@media(max-width:900px){
  .sidebar{position:fixed;left:-260px;top:0;transition:.3s;z-index:200;}
  .sidebar.open{left:0;}
  .hamburger{display:flex;}
  .main{padding:16px;}
}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-2);}
.empty-state i{font-size:34px;margin-bottom:10px;display:block;opacity:.5;}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="logo-badge"><i class="fa-solid fa-shield-halved"></i></div>
  <h2>WAR EMPIRE</h2>
  <div class="loading-bar"><span></span></div>
  <p id="loading-text">Menghubungkan ke server komando...</p>
  <div id="name-entry" class="glass" style="display:none;flex-direction:column;gap:14px;padding:24px;width:100%;max-width:340px;">
    <div style="text-align:center;">
      <i class="fa-solid fa-flag" style="font-size:26px;color:var(--accent);"></i>
      <h3 style="margin-top:8px;">Dirikan Negara Anda</h3>
      <p style="font-size:12px;color:var(--text-2);margin-top:4px;">Masukkan nama negara untuk mulai bermain</p>
    </div>
    <input id="name-entry-input" placeholder="Contoh: Nusantara Union" maxlength="30"
      style="padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.06);border:1px solid var(--glass-border);color:#fff;text-align:center;">
    <button class="btn" id="name-entry-btn"><i class="fa-solid fa-flag-checkered"></i> Mulai Bermain</button>
  </div>
</div>

<div id="toast-wrap"></div>

<div id="app">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo-badge"><i class="fa-solid fa-shield-halved"></i></div>
      <div><h1>WAR EMPIRE</h1><span>Military Command</span></div>
    </div>
    <div class="nav-item active" data-section="dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
    <div class="nav-item" data-section="upgrade"><i class="fa-solid fa-building-shield"></i> Upgrade Markas</div>
    <div class="nav-item" data-section="production"><i class="fa-solid fa-industry"></i> Produksi Unit</div>
    <div class="nav-item" data-section="research"><i class="fa-solid fa-flask"></i> Penelitian</div>
    <div class="nav-item" data-section="alliance"><i class="fa-solid fa-people-group"></i> Aliansi</div>
    <div class="nav-item" data-section="ranking"><i class="fa-solid fa-ranking-star"></i> Ranking Dunia</div>
    <div class="nav-item" data-section="war"><i class="fa-solid fa-crosshairs"></i> Deklarasi Perang
      <span class="nav-badge" id="war-badge">!</span>
    </div>
    <div class="nav-item" data-section="battle"><i class="fa-solid fa-explosion"></i> Ruang Perang</div>
    <div class="sidebar-footer">
      <div>Komandan Aktif</div>
      <div class="uid-tag" id="uid-tag">-</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <div class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></div>
        <h2 id="topbar-title"><i class="fa-solid fa-gauge-high"></i> Dashboard</h2>
      </div>
      <div class="topbar-stats">
        <div class="pill money glass"><i class="fa-solid fa-sack-dollar"></i> <span id="tb-money">0</span></div>
        <div class="pill power glass"><i class="fa-solid fa-bolt"></i> <span id="tb-power">0</span></div>
        <div class="pill online glass"><span class="dot"></span> <span id="tb-online">1</span> Online</div>
      </div>
    </div>

    <!-- ===== DASHBOARD ===== -->
    <div class="section active" id="section-dashboard"></div>

    <!-- ===== UPGRADE ===== -->
    <div class="section" id="section-upgrade"></div>

    <!-- ===== PRODUCTION ===== -->
    <div class="section" id="section-production"></div>

    <!-- ===== RESEARCH ===== -->
    <div class="section" id="section-research"></div>

    <!-- ===== ALLIANCE ===== -->
    <div class="section" id="section-alliance"></div>

    <!-- ===== RANKING ===== -->
    <div class="section" id="section-ranking"></div>

    <!-- ===== WAR ===== -->
    <div class="section" id="section-war"></div>

    <!-- ===== BATTLE ===== -->
    <div class="section" id="section-battle"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box glass" id="modal-box"></div>
</div>

/* ---------- UTILITIES ---------- */
function fmt(n){
  n = Math.floor(n||0);
  if(n>=1e9) return (n/1e9).toFixed(2)+"B";
  if(n>=1e6) return (n/1e6).toFixed(2)+"M";
  if(n>=1e3) return (n/1e3).toFixed(1)+"K";
  return n.toString();
}
function upgradeCost(base,mult,level){ return Math.floor(base*Math.pow(mult,level)); }
function rid(){ return Math.random().toString(36).slice(2,10); }

function toast(msg,type="info",icon="fa-circle-info"){
  const wrap = document.getElementById("toast-wrap");
  const el = document.createElement("div");
  el.className = "toast glass "+type;
  el.innerHTML = `<i class="fa-solid ${icon}"></i><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(),4100);
}

function animateNumber(el, from, to, suffix=""){
  if(!el) return;
  const key = el.id || el;
  cancelAnimationFrame(numberAnimFrames[key]);
  const dur = 600; const start = performance.now();
  function step(now){
    const p = Math.min(1,(now-start)/dur);
    const val = from + (to-from)*p;
    el.textContent = fmt(val)+suffix;
    if(p<1) numberAnimFrames[key] = requestAnimationFrame(step);
  }
  numberAnimFrames[key] = requestAnimationFrame(step);
}

/* ============================================================
   PAJAK NEGARA (pemasukan pasif otomatis 100 - 500 / jam)
   ============================================================ */
const TAX_MIN = 100;
const TAX_MAX = 500;
const TAX_OFFLINE_CAP_MS = 8*60*60*1000; // maksimal akumulasi 8 jam saat offline

function computeTaxRate(p){
  if(!p) return TAX_MIN;
  const hqLvl = p.buildings?.hq?.level || 1;
  const academyLvl = p.buildings?.academy?.level || 1;
  const intelLvl = p.buildings?.intel?.level || 1;
  const rate = 100 + hqLvl*8 + academyLvl*5 + intelLvl*4 + (p.level||1)*3;
  return Math.max(TAX_MIN, Math.min(TAX_MAX, Math.floor(rate)));
}

async function processTax(showToastIfBig){
  if(!CURRENT_UID) return;
  const ref = db.ref("players/"+CURRENT_UID);
  let earnedAmount = 0;
  const result = await ref.transaction(p=>{
    if(!p) return p;
    const rate = computeTaxRate(p);
    const last = p.lastTaxCollect || Date.now();
    const elapsed = Math.min(Date.now()-last, TAX_OFFLINE_CAP_MS);
    const earned = Math.floor((elapsed/3600000)*rate);
    if(earned>0){
      p.money = (p.money||0) + earned;
      earnedAmount = earned;
    }
    p.lastTaxCollect = Date.now();
    return p;
  });
  if(showToastIfBig && earnedAmount>=1){
    toast("Pajak negara terkumpul: +$"+fmt(earnedAmount),"success","fa-sack-dollar");
  }
}

/* recompute power based on buildings+research+army and push if changed */
function recalcPower(forcePush){
  if(!PLAYER) return;
  let p = 100 + PLAYER.level*20;
  for(const k in BUILDINGS){
    const lvl = (PLAYER.buildings && PLAYER.buildings[k]) ? PLAYER.buildings[k].level : 1;
    p += lvl*BUILDINGS[k].powerPerLvl;
  }
  for(const k in RESEARCH){
    const lvl = (PLAYER.research && PLAYER.research[k]) ? PLAYER.research[k].level : 0;
    p += lvl*RESEARCH[k].powerPerLvl;
  }
  for(const k in UNITS){
    const qty = (PLAYER.army && PLAYER.army[k]) ? PLAYER.army[k] : 0;
    p += qty*UNITS[k].power;
  }
  p = Math.floor(p);
  if(p !== PLAYER.power){
    PLAYER.power = p;
    db.ref("players/"+CURRENT_UID+"/power").set(p);
  }
}

  }).join("");
  document.getElementById("section-upgrade").innerHTML = `

      <h3><i class="fa-solid fa-building-shield"></i> Upgrade Markas (Tanpa Batas)</h3>
      ${rows}
    </div>`;

async function doUpgradeBuilding(key){
  const b = BUILDINGS[key];
  const lvl = PLAYER.buildings?.[key]?.level || 1;
  const cost = upgradeCost(b.base,b.mult,lvl);
  if(PLAYER.money < cost){ toast("Dana tidak cukup!","error","fa-triangle-exclamation"); return; }
  const ref = db.ref("players/"+CURRENT_UID);
  await ref.transaction(p=>{
    if(!p) return p;
    if(p.money < cost) return p;
    p.money -= cost;
    if(!p.buildings) p.buildings = {};
    if(!p.buildings[key]) p.buildings[key] = {level:1};
    p.buildings[key].level += 1;
    return p;
  });
  toast(b.name+" naik ke Level "+(lvl+1)+"!","success","fa-arrow-up");
}

            </div>
            <div class="timer-txt qtimer">--:--</div>
          </div>`).join("")}
      </div>
    </div>`;
  updateProdPreview();
  document.getElementById("prod-unit-select").addEventListener("change",updateProdPreview);
  document.getElementById("prod-unit-qty").addEventListener("input",updateProdPreview);

function updateProdPreview(){
  const type = document.getElementById("prod-unit-select").value;
  const qty = parseInt(document.getElementById("prod-unit-qty").value)||1;
  const u = UNITS[type];
  document.getElementById("prod-cost-preview").innerHTML =
    `Total biaya: <b style="color:var(--warn)">$${fmt(u.cost*qty)}</b> · Waktu: <b style="color:var(--accent)">${u.time*Math.max(1,Math.ceil(qty/5))}s (paralel per-5 unit)</b>`;
}

async function startProduction(){
  const type = document.getElementById("prod-unit-select").value;
  const qty = parseInt(document.getElementById("prod-unit-qty").value)||1;
  const u = UNITS[type];
  const totalCost = u.cost*qty;
  if(PLAYER.money < totalCost){ toast("Dana tidak cukup untuk produksi ini!","error","fa-triangle-exclamation"); return; }
  const duration = u.time*Math.max(1,Math.ceil(qty/5));
  const qid = rid();
  const ref = db.ref("players/"+CURRENT_UID);
  const ok = await ref.transaction(p=>{
    if(!p) return p;
    if(p.money < totalCost) return p;
    p.money -= totalCost;
    if(!p.production) p.production = {queue:{}};
    if(!p.production.queue) p.production.queue = {};
    p.production.queue[qid] = {type, qty, startTime:Date.now(), endTime:Date.now()+duration*1000};
    return p;
  });
  toast("Produksi "+qty+"x "+u.name+" dimulai!","success","fa-industry");
}

function tickProductionQueue(){
  clearInterval(productionTickHandle);
  productionTickHandle = setInterval(()=>{
    const items = document.querySelectorAll(".queue-item");
    const now = Date.now();
    items.forEach(el=>{
      const end = parseInt(el.dataset.end);
      const qid = el.dataset.qid;
      const remain = end-now;
      const bar = el.querySelector(".qbar");
      const timerTxt = el.querySelector(".qtimer");
      const item = PLAYER.production?.queue?.[qid];
      if(!item) return;
      const total = item.endTime-item.startTime;
      const elapsed = Math.min(total, now-item.startTime);
      bar.style.width = Math.min(100,(elapsed/total)*100)+"%";
      if(remain<=0){
        timerTxt.textContent = "Selesai!";
        completeProduction(qid, item);
      } else {
        const s = Math.floor(remain/1000);
        timerTxt.textContent = String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
      }
    });
  }, 1000);
}

let completingLock = {};
async function completeProduction(qid, item){
  if(completingLock[qid]) return;
  completingLock[qid] = true;
  const ref = db.ref("players/"+CURRENT_UID);
  await ref.transaction(p=>{
    if(!p || !p.production || !p.production.queue || !p.production.queue[qid]) return p;
    const it = p.production.queue[qid];
    if(!p.army) p.army = {};
    p.army[it.type] = (p.army[it.type]||0) + it.qty;
    delete p.production.queue[qid];
    return p;
  });
  toast("Produksi selesai: "+item.qty+"x "+UNITS[item.type].name+" siap bertugas!","success","fa-check-double");
}

async function respondWar(warId, notifId, accept){
  await db.ref("notifications/"+CURRENT_UID+"/"+notifId).update({read:true});
  const warRef = db.ref("wars/"+warId);

  const war = snap.val();
  if(!war) return;
  if(!accept){
    await warRef.update({status:"rejected"});
    await db.ref("notifications/"+war.attacker).push({
      type:"war_rejected", warId, text: PLAYER.countryName+" menolak deklarasi perang Anda.", time:Date.now(), read:false
    });
    toast("Deklarasi perang ditolak","info","fa-ban");
    return;
  }
  await warRef.update({status:"preparing"});
  await db.ref("notifications/"+war.attacker).push({
    type:"war_accepted", warId, text: PLAYER.countryName+" menerima deklarasi perang Anda! Siapkan pasukan.", time:Date.now(), read:false
  });
  toast("Perang diterima! Siapkan strategi Anda.","warn","fa-shield-halved");
  goToBattle(warId);
}

let currentWarListener = null;
let selectedStrategy = "quick";

function loadBattleRoom(warId){
  if(currentWarListener) db.ref("wars/"+currentWarListener).off();
  currentWarListener = warId;
  db.ref("wars/"+warId).on("value", snap=>{
    const war = snap.val();
    if(!war) return;
    if(war.status==="preparing") renderPrepRoom(warId, war);
    else if(war.status==="simulating" || war.status==="finished") renderBattleSimUI(warId, war);
  });
}

function renderPrepRoom(warId, war){
  const isAttacker = war.attacker===CURRENT_UID;
  const myPrep = war.prep?.[CURRENT_UID];
  const oppUid = isAttacker ? war.defender : war.attacker;
  const oppReady = !!(war.prep?.[oppUid]?.ready);

  if(myPrep?.ready){
    document.getElementById("section-battle").innerHTML = `
      <div class="card glass" style="text-align:center;padding:50px 20px;">
        <i class="fa-solid fa-hourglass-half" style="font-size:36px;color:var(--warn);margin-bottom:14px;"></i>
        <h3>Menunggu lawan menyelesaikan persiapan...</h3>
        <p style="color:var(--text-2);margin-top:8px;font-size:13px;">${oppReady?"Lawan sudah siap! Memulai simulasi...":"Status lawan: sedang menyiapkan pasukan"}</p>
      </div>`;
    if(oppReady) maybeStartSimulation(warId);
    return;
  }

  const unitInputs = ["soldier","tank","jet","ship","drone","missile"].map(k=>{
    const max = PLAYER.army?.[k]||0;
    return `
    <div class="form-group">
      <label>${UNITS[k].emoji} ${UNITS[k].name} (Maks: ${max})</label>
      <input type="number" id="send-${k}" min="0" max="${max}" value="0" style="width:100%;">
    </div>`;
  }).join("");

  const stratOpts = Object.entries(STRATEGIES).map(([k,s])=>`
    <div class="strategy-opt ${k===selectedStrategy?'active':''}" onclick="selectStrategy('${k}')" data-strat="${k}">
      <i class="fa-solid ${s.icon}"></i><br>${s.name}
    </div>`).join("");

  document.getElementById("section-battle").innerHTML = `
    <div class="country-banner glass">
      <div class="flag-big">${COUNTRY_ICON}</div>
      <div class="info"><h2>Persiapan Perang</h2><span>Melawan: ${isAttacker?war.defenderName:war.attackerName}</span></div>
    </div>
    <div class="grid cols-2">
      <div class="card glass">
        <h3><i class="fa-solid fa-people-group"></i> Pilih Pasukan</h3>
        <div class="grid cols-2">${unitInputs}</div>
      </div>
      <div class="card glass">
        <h3><i class="fa-solid fa-chess"></i> Pilih Strategi</h3>
        <div class="strategy-grid">${stratOpts}</div>
        <button class="btn danger" style="width:100%;margin-top:18px;" onclick="submitPrep('${warId}')">
          <i class="fa-solid fa-flag-checkered"></i> Siap Berperang
        </button>
      </div>
    </div>`;
}

function selectStrategy(k){
  selectedStrategy = k;
  document.querySelectorAll(".strategy-opt").forEach(el=>el.classList.toggle("active", el.dataset.strat===k));
}

async function submitPrep(warId){
  const units = {};
  let anyUnit = false;
  ["soldier","tank","jet","ship","drone","missile"].forEach(k=>{
    const v = parseInt(document.getElementById("send-"+k).value)||0;
    units[k] = v;
    if(v>0) anyUnit = true;
  });
  if(!anyUnit){ toast("Kirim minimal satu unit pasukan!","error","fa-triangle-exclamation"); return; }
  await db.ref("wars/"+warId+"/prep/"+CURRENT_UID).set({
    units, strategy: selectedStrategy, ready:true, submittedAt:Date.now()
  });
  toast("Pasukan siap dikerahkan!","success","fa-flag-checkered");
  maybeStartSimulation(warId);
}

/* Menghitung skor kekuatan tempur suatu pihak (deterministik, tanpa random) */
function computeCombatScore(playerData, sentUnits, strategyKey, isDefender){
  let unitPower = 0;
  for(const k in sentUnits){
    unitPower += (sentUnits[k]||0) * (UNITS[k]?.power||0);
  }
  const research = playerData.research||{};
  const researchBonus = 1 + (
    (research.armor?.level||0)*0.01 + (research.accuracy?.level||0)*0.01 +
    (research.aiCombat?.level||0)*0.015 + (research.speed?.level||0)*0.008 +
    (research.droneAI?.level||0)*0.01 + (research.tankEngine?.level||0)*0.008 +
    (research.jetEngine?.level||0)*0.008 + (research.satellite?.level||0)*0.008
  );
  const levelBonus = 1 + (playerData.level||1)*0.01;
  const strat = STRATEGIES[strategyKey] || STRATEGIES.quick;
  const stratMult = isDefender ? strat.defMult : strat.atkMult;
  // Moral: berdasarkan rasio menang historis (deterministik, bukan acak)
  const totalBattles = (playerData.wins||0)+(playerData.losses||0);
  const moral = 1 + (totalBattles>0 ? (playerData.wins/totalBattles)*0.15 : 0.05);
  // Bonus aliansi: +5% jika tergabung aliansi
  const allianceBonus = playerData.allianceId ? 1.05 : 1;
  // Logistik: mempengaruhi efisiensi pengerahan unit
  const logisticsLvl = research.logistics?.level||0;
  const logisticsFactor = 1 + logisticsLvl*0.01;
  const defenderHomeBonus = isDefender ? 1.1 : 1; // keuntungan bertahan di wilayah sendiri

  const score = unitPower * researchBonus * levelBonus * stratMult * moral * allianceBonus * logisticsFactor * defenderHomeBonus;
  return Math.max(1, Math.floor(score));
}

async function maybeStartSimulation(warId){
  const warRef = db.ref("wars/"+warId);
  const result = await warRef.transaction(war=>{
    if(!war) return war;
    if(war.status!=="preparing") return war;
    const atkReady = war.prep?.[war.attacker]?.ready;
    const defReady = war.prep?.[war.defender]?.ready;
    if(atkReady && defReady){
      war.status = "simulating";
    }
    return war;
  });
  if(result.committed && result.snapshot.val().status==="simulating"){
    runWarSimulation(warId, result.snapshot.val());
  }
}

async function runWarSimulation(warId, war){
  const [atkSnap, defSnap] = await Promise.all([
    db.ref("players/"+war.attacker).get(), db.ref("players/"+war.defender).get()
  ]);
  const atkData = atkSnap.val(), defData = defSnap.val();
  const atkPrep = war.prep[war.attacker], defPrep = war.prep[war.defender];

  const atkScore = computeCombatScore(atkData, atkPrep.units, atkPrep.strategy, false);
  const defScore = computeCombatScore(defData, defPrep.units, defPrep.strategy, true);
  const winnerIsAttacker = atkScore >= defScore;
  const total = atkScore+defScore;
  const winMargin = Math.abs(atkScore-defScore)/total; // 0..1

  const logs = buildBattleLog(atkData, defData, atkPrep, defPrep, winnerIsAttacker);

  // Tulis log satu-persatu ke Firebase dengan jeda (hanya dijalankan oleh 1 klien pemenang transaksi)
  for(let i=0;i<logs.length;i++){
    await db.ref("battleLogs/"+warId).push({day:i+1, text:logs[i], time:Date.now()});
    await new Promise(r=>setTimeout(r, 1400));
  }

  // Hitung reward/losses
  const winnerUid = winnerIsAttacker ? war.attacker : war.defender;
  const loserUid = winnerIsAttacker ? war.defender : war.attacker;
  const loserSent = winnerIsAttacker ? defPrep.units : atkPrep.units;
  const winnerSent = winnerIsAttacker ? atkPrep.units : defPrep.units;

  const lossRatio = 0.25 + winMargin*0.35; // 25%-60% unit yang dikirim hilang di pihak kalah
  const winnerLossRatio = 0.05 + (1-winMargin)*0.1; // pemenang tetap kehilangan sedikit unit

  const xpGain = Math.floor(200 + winMargin*300);
  const moneyGain = Math.floor(500 + winMargin*1500);
  const medals = Math.floor(1 + winMargin*4);

  await db.ref("players/"+winnerUid).transaction(p=>{
    if(!p) return p;
    p.wins = (p.wins||0)+1;
    p.xp = (p.xp||0)+xpGain;
    p.money = (p.money||0)+moneyGain;
    p.medals = (p.medals||0)+medals;
    if(p.xp >= p.level*1000){ p.xp -= p.level*1000; p.level += 1; }
    if(!p.army) p.army={};
    for(const k in winnerSent){
      const lost = Math.floor((winnerSent[k]||0)*winnerLossRatio);
      p.army[k] = Math.max(0,(p.army[k]||0)-lost);
    }
    return p;
  });
  await db.ref("players/"+loserUid).transaction(p=>{
    if(!p) return p;
    p.losses = (p.losses||0)+1;
    if(!p.army) p.army={};
    for(const k in loserSent){
      const lost = Math.floor((loserSent[k]||0)*lossRatio);
      p.army[k] = Math.max(0,(p.army[k]||0)-lost);
    }
    return p;
  });

  await db.ref("wars/"+warId).update({
    status:"finished", winner:winnerUid, loser:loserUid,
    atkScore, defScore, xpGain, moneyGain, medals, finishedAt: Date.now()
  });
  await db.ref("notifications/"+war.attacker).push({type:"war_finished", warId, text:"Perang telah selesai! Lihat hasilnya.", time:Date.now(), read:false});
  await db.ref("notifications/"+war.defender).push({type:"war_finished", warId, text:"Perang telah selesai! Lihat hasilnya.", time:Date.now(), read:false});
}

function buildBattleLog(atkData, defData, atkPrep, defPrep, winnerIsAttacker){
  const logs = [];
  logs.push(`Drone ${atkData.countryName} berhasil mendeteksi posisi markas pertahanan ${defData.countryName}.`);
  if((atkPrep.units.jet||0)>0) logs.push(`Jet Tempur ${atkData.countryName} melancarkan serangan udara ke pangkalan militer musuh.`);
  else logs.push(`Pasukan ${atkData.countryName} mulai bergerak mendekati garis depan.`);
  if((defPrep.units.missile||0)>0) logs.push(`Rudal pertahanan ${defData.countryName} berhasil menjatuhkan sebagian unit penyerang.`);
  else logs.push(`Pertahanan ${defData.countryName} bersiaga penuh menghadapi gelombang serangan.`);
  if((atkPrep.units.tank||0)>0) logs.push(`Tank ${atkData.countryName} memasuki wilayah perbatasan musuh dengan formasi ofensif.`);
  if((atkPrep.units.ship||0)>0 || (defPrep.units.ship||0)>0) logs.push(`Pertempuran laut sengit terjadi di perairan sengketa antara kedua kapal perang.`);
  logs.push(`Pasukan ${winnerIsAttacker?atkData.countryName:defData.countryName} berhasil menguasai titik strategis di medan tempur.`);
  logs.push(`Perang berakhir. ${winnerIsAttacker?atkData.countryName:defData.countryName} keluar sebagai pemenang pertempuran ini.`);
  return logs;
}

/* ---------- Battle Simulation UI (animasi + log realtime) ---------- */
function renderBattleSimUI(warId, war){
  document.getElementById("section-battle").innerHTML = `
    <div class="country-banner glass">
      <div class="flag-big">${COUNTRY_ICON}</div>
      <div class="info"><h2>${war.attackerName} <span style="color:var(--text-2);font-weight:400;">VS</span> ${war.defenderName}</h2>
      <span>${war.status==="finished"?"Perang telah selesai":"Simulasi pertempuran sedang berlangsung..."}</span></div>
      <div class="flag-big">${COUNTRY_ICON}</div>
    </div>
    <div class="battle-stage glass" id="battle-stage">
      <div class="battle-unit" style="left:5%;bottom:20px;">🪖</div>
      <div class="battle-unit jet" style="left:10%;">✈️</div>
      <div class="battle-unit" style="right:5%;bottom:20px;left:auto;">🏰</div>
      <div class="battle-unit jet" style="right:10%;left:auto;">✈️</div>
    </div>
    <div class="card glass">
      <h3><i class="fa-solid fa-scroll"></i> Log Pertempuran</h3>
      <div class="battle-log" id="battle-log-list"></div>
      ${war.status==="finished" ? renderWarResult(war) : ""}
    </div>`;
  animateBattleStage();
  db.ref("battleLogs/"+warId).on("child_added", snap=>{
    const log = snap.val();
    const list = document.getElementById("battle-log-list");
    if(!list) return;
    const div = document.createElement("div");
    div.className = "log-entry";
    div.innerHTML = `<b>Hari ${log.day}</b><span>${log.text}</span>`;
    list.appendChild(div);
    list.scrollTop = list.scrollHeight;
    spawnExplosion();
  });
}

function renderWarResult(war){
  const iWon = war.winner===CURRENT_UID;
  return `
    <div style="margin-top:18px;padding:18px;border-radius:14px;background:${iWon?'rgba(51,230,168,0.12)':'rgba(255,77,109,0.12)'};text-align:center;">
      <i class="fa-solid ${iWon?'fa-trophy':'fa-skull-crossbones'}" style="font-size:32px;color:${iWon?'var(--success)':'var(--danger)'};"></i>
      <h3 style="margin-top:10px;">${iWon?'KEMENANGAN!':'KEKALAHAN'}</h3>
      ${iWon?`<p style="color:var(--text-2);font-size:13px;margin-top:6px;">
        +${fmt(war.xpGain)} XP · +$${fmt(war.moneyGain)} · +${war.medals} Medali</p>`:
        `<p style="color:var(--text-2);font-size:13px;margin-top:6px;">Sebagian unit yang dikirim hilang dalam pertempuran.</p>`}
    </div>`;
}

function animateBattleStage(){
  const units = document.querySelectorAll("#battle-stage .battle-unit");
  let dir = 1;
  setInterval(()=>{
    units.forEach((u,i)=>{
      const isRight = u.style.right !== "";
      const pct = 20+Math.random()*50;
      if(isRight) u.style.right = pct+"%"; else u.style.left = pct+"%";
    });
  }, 2000);
}
function spawnExplosion(){
  const stage = document.getElementById("battle-stage");
  if(!stage) return;
  const boom = document.createElement("div");
  boom.className = "explosion";
  boom.textContent = "💥";
  boom.style.left = (20+Math.random()*60)+"%";
  boom.style.top = (30+Math.random()*50)+"%";
  stage.appendChild(boom);
  setTimeout(()=>boom.remove(),900);
}
</script>
